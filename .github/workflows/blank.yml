# ==========================================
# Omegapplax Engine - Idea / Vision Template
# ==========================================
# This template represents the vision behind the engine,
# including performance goals, architecture, and usability philosophy.

name: Omegapplax Engine Vision

description: >
  Omegapplax Engine is a personal and ambitious open-source 3D game engine written in C#,
  created with the vision of combining the best aspects of modern game development tools
  into a single, intuitive, and powerful platform.

  Inspired by the flexibility of Unity and the graphical power of Unreal Engine,
  Omegapplax Engine aims to be a smooth and creative crossover between both worlds —
  delivering both accessibility and high-end capabilities.

  # Performance & Compilation Philosophy
  The engine is designed with a strong focus on fast compilation times and extremely high performance,
  taking inspiration from engines like Flax, which prioritize efficiency, responsiveness, and iteration speed.

  # Ease of Use & Workflow
  At the same time, Omegapplax Engine aims to provide a user-friendly and intuitive workflow,
  similar to Unigine and Unity, making development smooth, clean, and accessible.

  # C# Scripting Experience
  The scripting system is built entirely in C#, with a design very similar to Unity:
  - Component-based architecture
  - Scene-driven logic
  - Simple and powerful scripting workflow
  - Fast iteration and easy debugging

  This allows developers to quickly prototype ideas and build complex systems with minimal friction.

  # Vision
  The goal is to deliver:
  - A clean and intuitive workflow
  - A modular and extensible architecture
  - A complete and modern 3D toolset
  - Extremely fast iteration and compilation
  - A creative environment that empowers developers

  Omegapplax Engine is more than just a tool — it is a learning journey,
  a creative platform, and a long-term vision of what a modern C# game engine can become.

title: "[Idea] "

labels:
  - idea
  - discussion

body:
  - type: markdown
    attributes:
      value: |
        ## 💡 Share Your Idea

        Help improve Omegapplax Engine by sharing your ideas, suggestions, or creative concepts.

        This engine is built with a vision of:
        - High performance ⚡
        - Fast iteration 🔄
        - Ease of use 🎯
        - Creative freedom 🎨

  - type: textarea
    id: idea_description
    attributes:
      label: Describe your idea
      description: Explain your idea clearly and how it could improve the engine
      placeholder: Write your idea here...
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this idea useful or important?
      placeholder: Explain the motivation behind your idea...
    validations:
      required: false

  - type: textarea
    id: additional_context
    attributes:
      label: Additional Context
      description: Add any extra information, references, or examples
      placeholder: Links, images, or references...
    validations:
      required: false
